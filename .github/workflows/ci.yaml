---
name: CI

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CONTAINER_SUBSYS: podman

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint==1.37.1
      - name: Run yamllint
        run: yamllint --strict .

  checkmake:
    name: Makefile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install checkmake
        run: go install github.com/mrtazz/checkmake/cmd/checkmake@v0.2.2
      - name: Run checkmake
        run: checkmake Makefile

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: find . -name '*.sh' -print0 | xargs -0 shellcheck

  hadolint:
    name: Containerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Containerfile

  validate:
    name: Validate
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf install -y make git
      - name: Run validations
        run: make validate

  image-build:
    name: Container Image Build
    runs-on: ubuntu-latest
    needs: [validate, hadolint]
    container:
      image: fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf install -y make git podman
      - name: Build image
        run: make test
        timeout-minutes: 30
